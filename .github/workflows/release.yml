name: 🚀 Release

on:
  push:
    branches:
      - test-release

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # main

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@774c1d62961e73038a114d59c8847023c003194d # main
        with:
          node-version-file: ".tool-versions"

      - name: 🚀 Release on jsr
        run: |
          npx jsr publish
